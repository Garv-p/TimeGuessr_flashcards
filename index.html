<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TG Flashcards Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <section class="toolbar">
      <div class="mode-buttons">
        <button id="all-cards-mode" class="mode-button" type="button">All Cards</button>
        <button id="flashcard-mode" class="mode-button active" type="button">Flashcard</button>
        <button id="view-cards-mode" class="mode-button" type="button">View Cards</button>
      </div>

      <label class="search-block">
        <span>Search</span>
        <input id="search-input" type="search" placeholder="Year, image id, decade, country...">
      </label>

      <label class="filter-block">
        <span>Decade</span>
        <select id="decade-select">
          <option value="all">All decades</option>
        </select>
      </label>

      <label class="filter-block">
        <span>Sort</span>
        <select id="sort-select">
          <option value="year-asc">Year ascending</option>
          <option value="year-desc">Year descending</option>
        </select>
      </label>
    </section>

    <section class="summary-bar">
      <div>
        <span class="summary-label">Visible cards</span>
        <strong id="visible-count">0</strong>
      </div>
      <div>
        <span class="summary-label">Dataset</span>
        <strong>Static JSON + browser rendering</strong>
      </div>
    </section>

    <main id="card-grid" class="card-grid" aria-live="polite"></main>

    <div id="card-navigation" class="card-navigation hidden">
      <button id="prev-card" class="nav-button" type="button" aria-label="Previous card">&larr;</button>
      <span id="card-counter" class="card-counter">1 / 1</span>
      <button id="next-card" class="nav-button" type="button" aria-label="Next card">&rarr;</button>
    </div>
  </div>

  <template id="card-template">
    <article class="card">
      <div class="card-media">
        <div class="card-image-wrap">
          <button class="image-button" type="button" aria-label="Open image larger">
            <img class="card-image" alt="">
          </button>
        </div>
        <div class="map-panel">
          <div class="map-header">
            <span>Destination</span>
            <button class="show-map-button" type="button">Show</button>
          </div>
          <div class="map-canvas hidden"></div>
        </div>
      </div>
        <div class="card-body">
          <div class="card-meta">
            <div>
              <p class="meta-label">Time</p>
              <p class="meta-value year-value"></p>
            </div>
            <div>
              <p class="meta-label">Country</p>
              <p class="meta-value country"></p>
            </div>
            <div>
              <p class="meta-label">Decade</p>
              <p class="meta-value decade"></p>
            </div>
          </div>
        <div class="description-panel">
          <p class="meta-label">Description</p>
          <p class="description-text"></p>
        </div>
      </div>
    </article>
  </template>

  <div id="image-lightbox" class="lightbox" hidden>
    <button id="lightbox-close" class="lightbox-close" type="button" aria-label="Close image viewer">Close</button>
    <img id="lightbox-image" class="lightbox-image" alt="">
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
